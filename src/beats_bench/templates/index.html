<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>beats-bench Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>beats-bench</h1>
      <p>Filebeat pipeline benchmark results &mdash; comparing PR performance against base branch</p>
      <div class="header-links">
        <a href="https://github.com/strawgate/beats-bench">Repository</a>
        <a href="https://github.com/strawgate/beats-bench/actions/workflows/bench.yml">Run Benchmark</a>
      </div>
    </div>

    <div id="loading" class="loading">Loading dashboard data</div>
    <div id="error" class="error" style="display:none"></div>
    <div id="content" style="display:none">

      <!-- Nightly section -->
      <div class="card" id="nightly-section" style="display:none">
        <h2>Nightly Benchmarks</h2>
        <div class="tracking-cards" id="nightly-cards"></div>
      </div>

      <!-- PR benchmarks table -->
      <div class="card" id="pr-section">
        <h2>PR Benchmarks</h2>
        <table>
          <thead>
            <tr>
              <th>PR</th>
              <th>Title</th>
              <th>Author</th>
              <th>State</th>
              <th class="num">Best Delta</th>
              <th>Runs</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="pr-table-body"></tbody>
        </table>
      </div>

      <!-- All runs list -->
      <div class="card">
        <h2>All Runs</h2>
        <div id="runs-list"></div>
      </div>

    </div>
  </div>

  <script id="page-data" type="application/json">__PAGE_DATA__</script>
  <script>
    const BASE_COLOR = 'rgb(37, 99, 235)';
    const PR_COLOR = 'rgb(22, 163, 74)';

    const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const gridColor = isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)';
    const textColor = isDark ? '#8b949e' : '#656d76';

    Chart.defaults.color = textColor;
    Chart.defaults.borderColor = gridColor;

    const pageData = JSON.parse(document.getElementById('page-data').textContent);
    const allRuns = pageData.runs || [];
    const prMetadata = pageData.pr_metadata || {};

    function formatDate(dateStr) {
      const d = new Date(dateStr);
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    function shortRef(ref) {
      if (ref && ref.length > 20) return ref.substring(0, 20) + '...';
      return ref || '';
    }

    function stateClass(state) {
      if (!state) return 'pr-open';
      const s = state.toUpperCase();
      if (s === 'MERGED') return 'pr-merged';
      if (s === 'CLOSED') return 'pr-closed';
      return 'pr-open';
    }

    function deltaClass(delta) {
      if (delta > 1) return 'delta-positive';
      if (delta < -1) return 'delta-negative';
      return 'delta-neutral';
    }

    function init() {
      const loadingEl = document.getElementById('loading');
      const errorEl = document.getElementById('error');
      const contentEl = document.getElementById('content');

      if (allRuns.length === 0) {
        loadingEl.style.display = 'none';
        errorEl.textContent = 'No benchmark runs yet. Trigger a benchmark from GitHub Actions.';
        errorEl.style.display = 'block';
        return;
      }

      renderNightly();
      renderPRTable();
      renderRunsList();

      loadingEl.style.display = 'none';
      contentEl.style.display = 'block';
    }

    function renderNightly() {
      const nightlyRuns = allRuns.filter(r => (r.type || 'pr') === 'nightly');
      if (nightlyRuns.length === 0) return;

      const section = document.getElementById('nightly-section');
      section.style.display = 'block';
      const container = document.getElementById('nightly-cards');

      // Group by scenario+cpu, collect EPS trend
      const combos = new Map();
      for (const run of nightlyRuns) {
        const summary = run.summary || {};
        for (const [scenario, cpuData] of Object.entries(summary)) {
          for (const [cpu, stats] of Object.entries(cpuData)) {
            const key = `${scenario} (${cpu} CPU)`;
            if (!combos.has(key)) combos.set(key, []);
            combos.get(key).push({ date: run.date, pr_avg: stats.pr_avg, base_avg: stats.base_avg });
          }
        }
      }

      for (const [label, points] of combos) {
        // Sort oldest first for sparkline
        points.sort((a, b) => a.date.localeCompare(b.date));
        const latest = points[points.length - 1];

        const card = document.createElement('div');
        card.className = 'tracking-card';
        card.innerHTML = `
          <div class="tracking-card-label">${label}</div>
          <div class="tracking-card-value">${latest.pr_avg ? latest.pr_avg.toLocaleString() : 'N/A'} EPS</div>
          <div class="sparkline-container"><canvas></canvas></div>
        `;
        container.appendChild(card);

        const canvas = card.querySelector('canvas');
        new Chart(canvas, {
          type: 'line',
          data: {
            labels: points.map(p => ''),
            datasets: [{
              data: points.map(p => p.pr_avg || p.base_avg || 0),
              borderColor: PR_COLOR,
              borderWidth: 1.5,
              pointRadius: 0,
              tension: 0.3,
              fill: false,
            }],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false }, tooltip: { enabled: false } },
            scales: {
              x: { display: false },
              y: { display: false },
            },
          },
        });
      }
    }

    function renderPRTable() {
      const prRuns = allRuns.filter(r => (r.type || 'pr') === 'pr' && r.pr_number);

      // Group by pr_number
      const grouped = new Map();
      for (const run of prRuns) {
        const pn = run.pr_number;
        if (!grouped.has(pn)) grouped.set(pn, []);
        grouped.get(pn).push(run);
      }

      const tbody = document.getElementById('pr-table-body');
      if (grouped.size === 0) {
        tbody.innerHTML = '<tr><td colspan="7" style="color:var(--text-muted)">No PR benchmarks yet.</td></tr>';
        return;
      }

      let html = '';
      for (const [pn, runs] of grouped) {
        const meta = prMetadata[pn] || {};
        const title = meta.title || `PR #${pn}`;
        const author = meta.author ? (meta.author.login || meta.author) : '';
        const state = meta.state || '';

        // Find best delta
        let bestDelta = null;
        for (const run of runs) {
          const summary = run.summary || {};
          for (const cpuData of Object.values(summary)) {
            for (const stats of Object.values(cpuData)) {
              const d = stats.delta_pct;
              if (bestDelta === null || Math.abs(d) > Math.abs(bestDelta)) {
                bestDelta = d;
              }
            }
          }
        }

        const deltaStr = bestDelta !== null
          ? `${bestDelta >= 0 ? '+' : ''}${bestDelta.toFixed(1)}%`
          : 'N/A';
        const dCls = bestDelta !== null ? deltaClass(bestDelta) : '';

        html += `<tr>
          <td><a href="pr/${pn}/index.html" style="color:var(--accent)">#${pn}</a></td>
          <td>${title}</td>
          <td>${typeof author === 'object' ? author.login : author}</td>
          <td>${state ? `<span class="pr-state-badge ${stateClass(state)}">${state}</span>` : ''}</td>
          <td class="num ${dCls}">${deltaStr}</td>
          <td>${runs.length}</td>
          <td><a href="pr/${pn}/index.html" style="color:var(--accent)">Details</a></td>
        </tr>`;
      }
      tbody.innerHTML = html;
    }

    function renderRunsList() {
      const container = document.getElementById('runs-list');
      let html = '';
      for (const run of allRuns) {
        const runUrl = `run/${run.id}/index.html`;
        const prLabel = run.pr_number ? ` &mdash; PR #${run.pr_number}` : '';
        const typeLabel = (run.type || 'pr') === 'nightly'
          ? '<span class="scenario-tag">nightly</span>'
          : '';

        html += `
          <a class="run-item" href="${runUrl}">
            <div class="run-meta">
              <div class="refs">
                <span class="badge badge-base">base: ${run.base_ref}</span>
                <span class="badge badge-pr">PR: ${shortRef(run.pr_ref)}</span>
                ${typeLabel}
              </div>
              <div class="date">${formatDate(run.date)} &mdash; Run #${run.id}${prLabel}</div>
            </div>
            <div class="run-scenarios">
              ${(run.scenarios || []).map(s => `<span class="scenario-tag">${s}</span>`).join('')}
              ${(run.cpus || []).map(c => `<span class="scenario-tag">${c} CPU</span>`).join('')}
            </div>
          </a>`;
      }
      container.innerHTML = html;
    }

    init();
  </script>
</body>
</html>

# Passthrough — no processors. Measures raw filebeat overhead.
filebeat.inputs:
  - type: benchmark
    enabled: true
    message: "2025-03-07T11:06:39.123456789Z INFO  [application] app/server.go:142 method=GET path=/api/v1/health status=200 duration_ms=3.42 request_id=req-a1b2c3d4 user_id=usr-5678 ip=10.0.0.42"
    threads: 1

output.elasticsearch:
  hosts: ["mock-es:9200"]
  protocol: "http"
  allow_older_versions: true

http.enabled: true
http.host: "0.0.0.0"
http.port: 5066
http.pprof.enabled: true

logging.level: warning
logging.to_files: false

queue.mem:
  events: 4096
  flush.min_events: 1024
  flush.timeout: 1s

filebeat.inputs:
  - type: benchmark
    enabled: true
    message: "2025-03-07T11:06:39.123456789Z INFO  [application] app/server.go:142 method=GET path=/api/v1/health status=200 duration_ms=3.42 request_id=req-a1b2c3d4 user_id=usr-5678 ip=10.0.0.42"
    threads: 1

processors:
  - rename:
      fields:
        - {from: "message", to: "event.original"}
      ignore_missing: true
  - dissect:
      tokenizer: "%{timestamp} %{log_level}  [%{component}] %{source} method=%{method} path=%{path} status=%{status} duration_ms=%{duration} request_id=%{request_id} user_id=%{user_id} ip=%{client_ip}"
      field: "event.original"
      target_prefix: "dissect"
  - add_fields:
      target: "agent"
      fields:
        id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        name: "gke-node-abc123"
        version: "8.17.0"
        type: "filebeat"
        hostname: "gke-node-abc123"
  - add_fields:
      target: ""
      fields:
        ecs.version: "8.0.0"
        data_stream.type: "logs"
        data_stream.dataset: "generic"
        data_stream.namespace: "default"
  - add_fields:
      target: "elastic_agent"
      fields:
        id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        version: "8.17.0"
        snapshot: false
  - add_host_metadata:
      when.not.contains.tags: forwarded
  - add_fields:
      target: "cloud"
      fields:
        provider: "gcp"
        availability_zone: "us-central1-a"
        region: "us-central1"
        instance.id: "1234567890123456789"
        instance.name: "gke-cluster-default-pool-abc123"
        machine.type: "e2-standard-4"
        project.id: "my-project-123456"
  - add_fields:
      target: "container"
      fields:
        id: "def456789abc"
        image.name: "myrepo/myimage:latest"
        name: "mycontainer"
        labels.app: "myapp"
        labels.version: "v1.2.3"
  - add_fields:
      target: "kubernetes"
      fields:
        pod.name: "myapp-deployment-7b9c5d8f6-x2k4m"
        pod.uid: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        pod.namespace: "default"
        pod.labels.app: "myapp"
        node.name: "gke-cluster-default-pool-abc123"
        namespace: "default"

output.elasticsearch:
  hosts: ["mock-es:9200"]
  protocol: "http"
  allow_older_versions: true

http.enabled: true
http.host: "0.0.0.0"
http.port: 5066
http.pprof.enabled: true

logging.level: warning
logging.to_files: false

queue.mem:
  events: 4096
  flush.min_events: 1024
  flush.timeout: 1s

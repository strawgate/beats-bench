name: Filebeat Pipeline Benchmark

on:
  workflow_dispatch:
    inputs:
      base_ref:
        description: "Base ref (branch, tag, or commit SHA) — typically elastic/beats main"
        required: true
        default: "main"
      pr_ref:
        description: "PR ref (branch, tag, or commit SHA) — the change to benchmark"
        required: true
        default: "main"
      beats_repo:
        description: "Beats repo (owner/repo)"
        required: true
        default: "elastic/beats"
      pr_repo:
        description: "PR repo (owner/repo) — if different from beats_repo"
        required: false
        default: ""
      scenarios:
        description: "Comma-separated pipeline scenarios"
        required: true
        default: "full-agent-dissect,full-agent-rename-only,enrichment-only,passthrough"
      cpus:
        description: "Comma-separated CPU limits for Docker (0.5,1.0)"
        required: true
        default: "0.5,1.0"
      runs_per_scenario:
        description: "Number of measurement runs per binary per scenario"
        required: true
        default: "3"
      measurement_seconds:
        description: "Seconds to measure each run"
        required: true
        default: "20"

permissions:
  contents: write
  issues: write

jobs:
  # ---------------------------------------------------------------
  # Build both binaries
  # ---------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        variant: [base, pr]
    steps:
      - name: Resolve commit SHA
        id: resolve
        run: |
          REPO=${{ matrix.variant == 'pr' && (inputs.pr_repo || inputs.beats_repo) || inputs.beats_repo }}
          REF=${{ matrix.variant == 'pr' && inputs.pr_ref || inputs.base_ref }}
          SHA=$(git ls-remote "https://github.com/${REPO}.git" "${REF}" | head -1 | cut -f1)
          # If REF is already a SHA (ls-remote returns empty), use it directly
          if [ -z "$SHA" ]; then SHA="$REF"; fi
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "Resolved $REF -> $SHA"

      - name: Check binary cache
        id: cache
        uses: actions/cache@v4
        with:
          path: filebeat-${{ matrix.variant }}
          key: filebeat-${{ steps.resolve.outputs.sha }}

      - name: Set up Go
        if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: false

      - name: Checkout beats
        if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ matrix.variant == 'pr' && (inputs.pr_repo || inputs.beats_repo) || inputs.beats_repo }}
          ref: ${{ matrix.variant == 'pr' && inputs.pr_ref || inputs.base_ref }}
          path: beats

      - name: Build filebeat
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          cd beats/x-pack/filebeat
          CGO_ENABLED=0 GOFLAGS=-mod=mod go build -o ${{ github.workspace }}/filebeat-${{ matrix.variant }} .
          echo "Build ID: $(go tool buildid ${{ github.workspace }}/filebeat-${{ matrix.variant }} | cut -c1-16)"

      - name: Cache hit
        if: steps.cache.outputs.cache-hit == 'true'
        run: echo "Using cached binary for ${{ steps.resolve.outputs.sha }}"

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: filebeat-${{ matrix.variant }}
          path: filebeat-${{ matrix.variant }}
          retention-days: 1

  # ---------------------------------------------------------------
  # Build mock-es
  # ---------------------------------------------------------------
  build-mock-es:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: false
      - name: Build mock-es
        run: |
          cd mock-es
          CGO_ENABLED=0 go build -o ${{ github.workspace }}/mock-es-bin .
      - uses: actions/upload-artifact@v4
        with:
          name: mock-es
          path: mock-es-bin
          retention-days: 1

  # ---------------------------------------------------------------
  # Generate matrix from comma-separated inputs
  # ---------------------------------------------------------------
  matrix-setup:
    runs-on: ubuntu-latest
    outputs:
      scenarios: ${{ steps.gen.outputs.scenarios }}
      cpus: ${{ steps.gen.outputs.cpus }}
    steps:
      - id: gen
        run: |
          echo "scenarios=$(echo '${{ inputs.scenarios }}' | python3 -c 'import sys; print("[\"" + "\",\"".join(sys.stdin.read().strip().split(",")) + "\"]")')" >> $GITHUB_OUTPUT
          echo "cpus=$(echo '${{ inputs.cpus }}' | python3 -c 'import sys; print("[\"" + "\",\"".join(sys.stdin.read().strip().split(",")) + "\"]")')" >> $GITHUB_OUTPUT

  # ---------------------------------------------------------------
  # Benchmark matrix: scenario × cpu
  # ---------------------------------------------------------------
  bench:
    needs: [build, build-mock-es, matrix-setup]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        scenario: ${{ fromJson(needs.matrix-setup.outputs.scenarios) }}
        cpu: ${{ fromJson(needs.matrix-setup.outputs.cpus) }}
    steps:
      - uses: actions/checkout@v4

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          path: bin

      - name: Prepare
        run: |
          chmod +x bin/filebeat-base/filebeat-base bin/filebeat-pr/filebeat-pr bin/mock-es/mock-es-bin
          sudo cp bin/mock-es/mock-es-bin /usr/local/bin/mock-es
          sudo cp pipelines/${{ matrix.scenario }}.yml /tmp/fb-config.yml
          sudo chown root:root /tmp/fb-config.yml

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Run benchmarks
        run: |
          uv run beats-bench run-scenario \
            --base-binary bin/filebeat-base/filebeat-base \
            --pr-binary bin/filebeat-pr/filebeat-pr \
            --config /tmp/fb-config.yml \
            --mock-es /usr/local/bin/mock-es \
            --cpus ${{ matrix.cpu }} \
            --measure ${{ inputs.measurement_seconds }} \
            --runs ${{ inputs.runs_per_scenario }} \
            --output-dir results

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ matrix.scenario }}-${{ matrix.cpu }}cpu
          path: |
            results/
          retention-days: 30

  # ---------------------------------------------------------------
  # Summarize all results
  # ---------------------------------------------------------------
  summarize:
    needs: bench
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          pattern: results-*
          path: all-results

      - name: Set up Go (for pprof)
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: false

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Generate summary
        run: |
          uv run beats-bench summarize \
            --results-dir all-results \
            --base-ref "${{ inputs.base_ref }}" \
            --pr-ref "${{ inputs.pr_ref }}" \
            --base-repo "${{ inputs.beats_repo }}" \
            --pr-repo "${{ inputs.pr_repo || inputs.beats_repo }}" \
            --runs-per-scenario "${{ inputs.runs_per_scenario }}" \
            --measure-seconds "${{ inputs.measurement_seconds }}"

      - name: Post summary to job
        run: cat summary.md >> $GITHUB_STEP_SUMMARY

      - name: Publish throughput dashboard
        uses: benchmark-action/github-action-benchmark@v1
        if: always()
        continue-on-error: true
        with:
          name: Throughput (higher is better)
          tool: customBiggerIsBetter
          output-file-path: gh-bench-bigger.json
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench/throughput
          auto-push: true

      - name: Publish efficiency dashboard
        uses: benchmark-action/github-action-benchmark@v1
        if: always()
        continue-on-error: true
        with:
          name: Efficiency (lower is better)
          tool: customSmallerIsBetter
          output-file-path: gh-bench-smaller.json
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench/efficiency
          auto-push: true

      - name: Upload summary and diffs
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-summary
          path: |
            summary.md
            gh-bench-bigger.json
            gh-bench-smaller.json
            all-results/**/*-diff.txt
            all-results/**/*.pprof
          retention-days: 90

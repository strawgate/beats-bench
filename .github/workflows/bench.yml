name: Filebeat Pipeline Benchmark

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to benchmark (branch, tag, or commit SHA)"
        required: true
        default: "main"
      beats_repo:
        description: "Beats repo (owner/repo)"
        required: true
        default: "elastic/beats"
      scenarios:
        description: "Comma-separated pipeline scenarios"
        required: true
        default: "full-agent-dissect,full-agent-rename-only,enrichment-only,passthrough"
      cpus:
        description: "Comma-separated CPU limits for Docker (0.5,1.0)"
        required: true
        default: "0.5,1.0"
      runs_per_scenario:
        description: "Number of measurement runs per scenario"
        required: true
        default: "3"
      measurement_seconds:
        description: "Seconds to measure each run"
        required: true
        default: "60"
      pr_number:
        description: "PR number (optional — enables comparison against baseline)"
        required: false
        default: ""
      comparison_threshold:
        description: "Regression threshold percentage for compare"
        required: false
        default: "5"

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------
  # Build filebeat
  # ---------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve commit SHA
        id: resolve
        run: |
          REPO="${{ inputs.beats_repo || 'elastic/beats' }}"
          REF="${{ inputs.ref || 'main' }}"
          SHA=$(git ls-remote "https://github.com/${REPO}.git" "${REF}" | head -1 | cut -f1)
          if [ -z "$SHA" ]; then SHA="$REF"; fi
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "Resolved $REF -> $SHA"

      - name: Check binary cache
        id: cache
        uses: actions/cache@v4
        with:
          path: filebeat
          key: filebeat-${{ steps.resolve.outputs.sha }}

      - name: Set up Go
        if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: false

      - name: Checkout beats
        if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.beats_repo || 'elastic/beats' }}
          ref: ${{ inputs.ref || 'main' }}
          path: beats

      - name: Build filebeat
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          cd beats/x-pack/filebeat
          CGO_ENABLED=0 GOFLAGS=-mod=mod go build -o ${{ github.workspace }}/filebeat .

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: filebeat
          path: filebeat
          retention-days: 1

  # ---------------------------------------------------------------
  # Build mock-es
  # ---------------------------------------------------------------
  build-mock-es:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: false
      - name: Build mock-es
        run: |
          cd mock-es
          CGO_ENABLED=0 go build -o ${{ github.workspace }}/mock-es-bin .
      - uses: actions/upload-artifact@v4
        with:
          name: mock-es
          path: mock-es-bin
          retention-days: 1

  # ---------------------------------------------------------------
  # Generate matrix from comma-separated inputs
  # ---------------------------------------------------------------
  matrix-setup:
    runs-on: ubuntu-latest
    outputs:
      scenarios: ${{ steps.gen.outputs.scenarios }}
      cpus: ${{ steps.gen.outputs.cpus }}
    steps:
      - id: gen
        run: |
          echo "scenarios=$(echo '${{ inputs.scenarios || 'full-agent-dissect,full-agent-rename-only,enrichment-only,passthrough' }}' | python3 -c 'import sys; print("[\"" + "\",\"".join(sys.stdin.read().strip().split(",")) + "\"]")')" >> $GITHUB_OUTPUT
          echo "cpus=$(echo '${{ inputs.cpus || '0.5,1.0' }}' | python3 -c 'import sys; print("[\"" + "\",\"".join(sys.stdin.read().strip().split(",")) + "\"]")')" >> $GITHUB_OUTPUT

  # ---------------------------------------------------------------
  # Benchmark matrix: scenario × cpu
  # ---------------------------------------------------------------
  bench:
    needs: [build, build-mock-es, matrix-setup]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        scenario: ${{ fromJson(needs.matrix-setup.outputs.scenarios) }}
        cpu: ${{ fromJson(needs.matrix-setup.outputs.cpus) }}
    steps:
      - uses: actions/checkout@v4

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          path: bin

      - name: Prepare
        run: |
          chmod +x bin/filebeat/filebeat bin/mock-es/mock-es-bin
          sudo cp bin/mock-es/mock-es-bin /usr/local/bin/mock-es
          sudo cp pipelines/${{ matrix.scenario }}.yml /tmp/fb-config.yml
          sudo chown root:root /tmp/fb-config.yml

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Run benchmarks
        run: |
          uv run beats-bench run-benchmark \
            --binary bin/filebeat/filebeat \
            --config /tmp/fb-config.yml \
            --mock-es /usr/local/bin/mock-es \
            --cpus ${{ matrix.cpu }} \
            --measure ${{ inputs.measurement_seconds || '20' }} \
            --runs ${{ inputs.runs_per_scenario || '3' }} \
            --scenario ${{ matrix.scenario }} \
            --output-dir results

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ matrix.scenario }}-${{ matrix.cpu }}cpu
          path: results/
          retention-days: 30

  # ---------------------------------------------------------------
  # Collect results, stash with benchkit, then aggregate or compare
  # ---------------------------------------------------------------
  publish:
    needs: bench
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Download bench results
        uses: actions/download-artifact@v4
        with:
          pattern: results-*
          path: all-results

      - name: Resolve beats commit SHA
        id: beats
        run: |
          REPO="${{ inputs.beats_repo || 'elastic/beats' }}"
          REF="${{ inputs.ref || 'main' }}"
          SHA=$(git ls-remote "https://github.com/${REPO}.git" "${REF}" | head -1 | cut -f1)
          if [ -z "$SHA" ]; then SHA="$REF"; fi
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "ref=refs/heads/${REF}" >> "$GITHUB_OUTPUT"
          echo "Beats ref: $REF ($SHA)"

      - name: Merge results into single file
        run: |
          python3 -c "
          import json, pathlib
          entries = []
          for f in sorted(pathlib.Path('all-results').rglob('results.json')):
              entries.extend(json.loads(f.read_text()))
          pathlib.Path('bench-results.json').write_text(json.dumps(entries, indent=2))
          print(f'Merged {len(entries)} entries from {len(list(pathlib.Path(\"all-results\").rglob(\"results.json\")))} files')
          "
          cat bench-results.json

      - name: Stash results to bench-data branch
        uses: strawgate/o11ykit/octo11y/actions/stash@main-dist
        env:
          GITHUB_SHA: ${{ steps.beats.outputs.sha }}
          GITHUB_REF: ${{ steps.beats.outputs.ref }}
        with:
          results: bench-results.json
          format: benchmark-action
          data-branch: bench-data

      - name: Aggregate index and series
        uses: strawgate/o11ykit/octo11y/actions/aggregate@main-dist
        with:
          data-branch: bench-data

      - name: Compare against baseline
        if: inputs.pr_number != ''
        id: compare
        uses: strawgate/o11ykit/octo11y/actions/compare@main-dist
        with:
          results: bench-results.json
          format: benchmark-action
          data-branch: bench-data
          baseline-runs: "5"
          threshold: ${{ inputs.comparison_threshold || '5' }}
          fail-on-regression: "false"

      - name: Post comparison to job summary
        if: inputs.pr_number != '' && steps.compare.outputs.summary != ''
        run: |
          {
            echo "## Benchmark Comparison — PR #${{ inputs.pr_number }}"
            echo ""
            echo "**Ref:** \`${{ inputs.ref }}\` @ \`${{ inputs.beats_repo || 'elastic/beats' }}\`"
            echo "**Regression detected:** ${{ steps.compare.outputs.has-regression }}"
            echo ""
            echo "${{ steps.compare.outputs.summary }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload pprof artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pprof-profiles
          path: |
            all-results/**/*.pprof
          retention-days: 90
          if-no-files-found: ignore
